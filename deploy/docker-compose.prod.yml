# Production override. Layer it on the default (dev) stack:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
# Use `make deploy` for a first deploy or a renewal — it obtains the
# Let's Encrypt cert (docker-compose.cert.yml) before bringing this up. Set DOMAIN
# and CERTBOT_EMAIL in .env and register https://$DOMAIN/... on your 42 OAuth app.
services:
  db:
    # Never publish Postgres in production: the app reaches it over the internal
    # network, and Docker's published ports bypass host firewalls (ufw etc.).
    ports: !override []

  app:
    # https flips the session/job/state cookies to Secure automatically.
    environment:
      FT_REDIRECT_URI: https://${DOMAIN}/api/v1/auth/42/callback

  nginx:
    volumes: !override
      - ./deploy/nginx/prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /tmp/acme_challenge:/tmp/acme_challenge:ro
    ports: !override
      - "80:80"
      - "443:443"
