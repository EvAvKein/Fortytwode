# Development Nginx: plain HTTP, no rate limiting. Mounted as the whole
# /etc/nginx/nginx.conf by docker-compose.yml. Still forwards the real client IP
# so the app's per-client logic behaves like production.
events {
  worker_connections 1024;
}

http {
  upstream app {
    server app:4242;
  }

  # Inherited by every location below (a location that declares its own
  # proxy_set_header would drop these, so the locations only add other directives).
  proxy_http_version 1.1;
  proxy_set_header Host              $http_host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection        "";

  server {
    listen 80;

    location / {
      proxy_pass http://app;
    }

    # Live sync progress (Server-Sent Events): stream without buffering.
    location = /api/fetch/stream {
      proxy_pass http://app;
      proxy_buffering off;
      proxy_read_timeout 1h;
    }
  }
}
