# Minimal HTTP-only Nginx used only during certificate issuance/renewal: it serves
# the Let's Encrypt ACME HTTP-01 challenge from the webroot that the certbot
# container writes to. Mounted as the whole /etc/nginx/nginx.conf by
# docker-compose.cert.yml.
events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    listen [::]:80;
    server_name fortytwode.net www.fortytwode.net;

    location ^~ /.well-known/acme-challenge/ {
      root /tmp/acme_challenge;
    }
  }
}
