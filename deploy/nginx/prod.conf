# Production Nginx: TLS termination (Let's Encrypt) + per-client rate limiting.
# Mounted as the whole /etc/nginx/nginx.conf by docker-compose.prod.yml. The cert
# is obtained out-of-band by docker-compose.cert.yml (see deploy.sh) and mounted
# from the host's /etc/letsencrypt.
events {
  worker_connections 1024;
}

http {
  upstream app {
    server app:4242;
  }

  # Per-client limits keyed by the real client IP (Nginx is the edge, so Docker's
  # NAT preserves it). Deliberately generous: a 42 campus behind one NAT IP must
  # not be throttled as a single user — the precise per-42-user lever is in the app.
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
  limit_req_zone $binary_remote_addr zone=sync:10m    rate=10r/m;
  limit_req_status 429;

  # Inherited by every location below (a location that declares its own
  # proxy_set_header would drop these, so the locations only add other directives).
  proxy_http_version 1.1;
  proxy_set_header Host              $http_host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection        "";

  # Plain HTTP: keep serving ACME challenges (so the cert can renew) and redirect
  # everything else to HTTPS.
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
      root /tmp/acme_challenge;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # Let's Encrypt cert under a fixed lineage name (certbot --cert-name fortytwode),
    # so this path never has to mention the domain.
    ssl_certificate     /etc/letsencrypt/live/fortytwode/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fortytwode/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers, inherited by every location below (none declares its own
    # add_header, which would drop these). "always" keeps them on error responses.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    error_page 429 @too_many_requests;
    location @too_many_requests {
      default_type application/json;
      return 429 '{"error":"too many requests — slow down and retry shortly"}';
    }

    # Brute-force slowdown on the credential endpoints.
    location = /api/v1/session {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://app;
    }
    location = /api/v1/account {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://app;
    }

    # Coarse cap on the expensive sync trigger; the app's per-client + per-42-user
    # limits do the precise work.
    location = /api/v1/sync {
      limit_req zone=sync burst=5 nodelay;
      proxy_pass http://app;
    }

    # Live sync progress (SSE): stream without buffering, no rate limit.
    location = /api/v1/sync/stream {
      proxy_pass http://app;
      proxy_buffering off;
      proxy_read_timeout 1h;
    }

    location / {
      limit_req zone=general burst=50 nodelay;
      proxy_pass http://app;
    }
  }
}
